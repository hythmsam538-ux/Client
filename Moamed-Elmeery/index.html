<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mohamed El Meery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --main-color: #00b894;
      --bg-dark: linear-gradient(135deg, #000000, #003d2e, #001f17);
      --bg-light: linear-gradient(135deg, #ffffff, #ccfff1, #ffffff);
    }

    body {
      font-family: 'Tajawal', sans-serif;
      color: #fff;
      background: var(--bg-dark);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 15px;
      overflow-x: hidden;
      transition: 0.8s ease background, 0.8s ease color;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🌟 شاشة البداية */
    #intro-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeOut 1s ease forwards;
      animation-delay: 2.8s;
    }

    #intro-screen img {
      width: 600px;
      max-width: 80%;
      animation: fadeInLogo 3s ease;
    }

    @keyframes fadeInLogo {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* ✨ نجوم الخلفية */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
      z-index: 0;
    }

    .stars span {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: moveStar 10s linear infinite;
    }

    @keyframes moveStar {
      0% { transform: translateY(0) scale(1); opacity: 0.8; }
      50% { transform: translateY(100px) scale(1.2); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 0.8; }
    }

    /* 🟩 البطاقة */
    .card {
      position: relative;
      background: rgba(27, 27, 27, 0.9);
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
      text-align: center;
      max-width: 330px;
      width: 100%;
      backdrop-filter: blur(8px);
      border: 1px solid #00b89433;
      z-index: 2;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeInCard 1.5s ease-out forwards;
      animation-delay: 0s;
    }

    @keyframes fadeInCard {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .theme-toggle {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid var(--main-color);
      color: var(--main-color);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
      box-shadow: 0 0 8px var(--main-color);
    }

    .theme-toggle:hover {
      background: var(--main-color);
      color: #111;
      transform: scale(1.1);
    }

    .card img {
      width: 182px;
      height: 182px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 12px;
      border: 2px solid #00b894;
      box-shadow: 0 0 12px #00b89488;
    }

    .card h1 {
      font-size: 25px;
      margin-bottom: 10px;
      text-shadow: 0 0 4px #00b894;
    }

    .bio {
      font-size: 15px;
      margin-top: -8px;
      margin-bottom: 6px;
      text-shadow: 0 0 6px rgba(0, 255, 200, 0.4);
    }

    .quote {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 15px;
      text-shadow: 0 0 8px rgba(0, 184, 148, 0.5);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .links a {
      text-decoration: none;
      color: #fff;
      background: #222;
      padding: 10px;
      border-radius: 10px;
      transition: 0.3s;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(30px);
      animation: slideIn 0.8s forwards;
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .links a:hover {
      background: #00b894;
      color: #111;
      transform: scale(1.05);
      box-shadow: 0 0 12px #00b894aa;
    }

    .call-button {
      margin-top: 7px;
      display: inline-block;
      background: #00b894;
      color: #ffffff;
      padding: 10px 22px;
      border-radius: 40px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
    }

    footer {
      margin-top: 18px;
      font-size: 11px;
      color: #aaa;
    }

    .visits {
      position: absolute;
      bottom: 8px;
      left: 10px;
      font-size: 14px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .visits i {
      color: var(--main-color);
    }

    .visits span {
      opacity: 0;
      transition: 0.4s ease;
    }

    .visits.show span { opacity: 1; }

    /* 🌞 وضع النهار */
    body.light {
      background: var(--bg-light);
      color: #111;
    }

    body.light .card {
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
    }

    body.light .links a {
      background: #f0f0f0;
      color: #111;
    }

    body.light .links a:hover {
      background: #00b894;
      color: white;
    }

    /* 🟢 شريط التمرير الجانبي */
    #scroll-progress {
      position: fixed;
      right: 10px;
      top: 0;
      width: 6px;
      height: 0;
      background: var(--main-color);
      border-radius: 4px;
      z-index: 9999;
      box-shadow: 0 0 10px var(--main-color);
      transition: height 0.2s ease-out;
    }
  </style>
</head>
<body>

    <div class="visits" id="visits">
      <i class="fa fa-eye"></i>
      <span id="visit-count">0</span>
    </div>
  </div>

 <script type="module">
  // 🌙 تبديل الوضع الليلي / النهاري
  const toggleButton = document.getElementById('theme-toggle');
  const body = document.body;
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'light') {
    body.classList.add('light');
    toggleButton.innerHTML = '<i class="fas fa-sun"></i>';
  }

  toggleButton.addEventListener('click', () => {
    body.classList.toggle('light');
    const isLight = body.classList.contains('light');
    toggleButton.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
  });

  /* ------------------ 🔥 Firebase ------------------ */
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCkrUIoyIRdz2nrUg1iD22rComKYFlEexg",
    authDomain: "read-8f6ea.firebaseapp.com",
    databaseURL: "https://read-8f6ea-default-rtdb.firebaseio.com",
    projectId: "read-8f6ea",
    storageBucket: "read-8f6ea.firebasestorage.app",
    messagingSenderId: "850538566690",
    appId: "1:850538566690:web:a709bb63290101a8d1267b",
    measurementId: "G-699KDS1TBJ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const visitRef = ref(db, "visitCount_dr");

  // تحديث العدد مباشرة عند أي تغيير
  onValue(visitRef, snapshot => {
    let visits = snapshot.exists() ? snapshot.val() : 0;
    document.getElementById("visit-count").textContent = visits;
  });

  // زيادة العدد عند زيارة جديدة
  get(visitRef).then(snapshot => {
    let visits = snapshot.exists() ? snapshot.val() : 0;
    visits++;
    set(visitRef, visits);
  });

  // 📌 إظهار/إخفاء العدد عند الضغط على العين
  document.getElementById("visits").addEventListener("click", e => {
    e.currentTarget.classList.toggle("show");
  });
  /* ------------------------------------------------------- */

  // ✨ توليد النجوم
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 70; i++) {
    const star = document.createElement('span');
    star.style.top = Math.random() * 100 + '%';
    star.style.left = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 5 + 's';
    star.style.animationDuration = 6 + Math.random() * 5 + 's';
    starsContainer.appendChild(star);
  }

  // 🕓 تسلسل ظهور الأزرار
  const links = document.querySelectorAll('.links a');
  links.forEach((link, index) => {
    link.style.animationDelay = `${index * 0.2}s`;
  });

  // 🟢 شريط التمرير الجانبي
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const scrollPercent = (scrollTop / docHeight) * 100;
    document.getElementById('scroll-progress').style.height = scrollPercent + '%';
  });
</script>


</body>
</html>
